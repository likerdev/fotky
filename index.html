<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEBILE</title>

  <style>
    @font-face {
      font-family: "Zalando Sans";
      src: url("https://static.zalando.com/fonts/zalando-sans/zalando-sans-black.woff2") format("woff2");
      font-weight: 900;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
      animation: bgFlash 0.08s steps(1) infinite;
    }

    .center {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-family: "Zalando Sans", sans-serif;
      font-size: clamp(3rem, 10vw, 10rem);
      line-height: 1;
      text-transform: uppercase;
      color: white;
      animation: textFlash 0.08s steps(1) infinite;
      user-select: none;
      word-break: break-word;
    }

    @keyframes bgFlash {
      0%, 49% {
        background: black;
      }
      50%, 100% {
        background: white;
      }
    }

    @keyframes textFlash {
      0%, 49% {
        color: white;
      }
      50%, 100% {
        color: black;
      }
    }
  </style>
</head>
<body>
  <div class="center">
    <h1>BYL JSI PODVEDEN HAHA!!!</h1>
  </div>
</body>
</html>
